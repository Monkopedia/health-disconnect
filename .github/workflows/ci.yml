name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # Backstop so a hung run fails fast and frees the runner instead of wedging for hours.
    timeout-minutes: 20
    # contents: write is needed so the record-and-commit step below can push the
    # regenerated screenshot baselines back to the PR head branch. On fork PRs the
    # GITHUB_TOKEN is downgraded to read-only, so that step is guarded to same-repo PRs.
    permissions:
      contents: write

    steps:
      # For pull_request events we check out the PR head branch (not the default
      # detached merge ref) with persisted credentials, so the record-and-commit
      # step can push the regenerated baselines straight back onto the PR. For push
      # events this falls back to the pushed ref.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Run unit tests
        run: ./gradlew testProdDebugUnitTest

      # Release-build guard for #56: the app identifies Health Connect record types by
      # KClass.qualifiedName (persisted in saved views) and labels them by simpleName, so if R8
      # obfuscates androidx.health.connect.client.records.** those names go unstable and every
      # saved view breaks after an update. Unit tests run against un-minified classes and can't
      # see this, so we run R8 for the release variant and assert the record classes keep their
      # real names in the mapping. This is what makes the proguard-rules keep rule enforceable.
      - name: Verify Health Connect record classes are not obfuscated
        run: |
          ./gradlew :app:minifyProdReleaseWithR8
          MAP=app/build/outputs/mapping/prodRelease/mapping.txt
          if [ ! -f "$MAP" ]; then
            echo "::error::R8 mapping not found at $MAP"; exit 1
          fi
          # Class-level lines look like "orig.Name -> target:"; for HC record classes the target
          # must remain the identical real name. Any other target means it was obfuscated.
          BAD=$(grep -E '^androidx\.health\.connect\.client\.records\.[A-Za-z0-9]+ -> ' "$MAP" \
                | grep -vE ' -> androidx\.health\.connect\.client\.records\.' || true)
          if [ -n "$BAD" ]; then
            echo "::error::Health Connect record classes are obfuscated by R8 — saved views will"
            echo "::error::break on update (issue #56). Ensure the -keepnames rule in"
            echo "::error::app/proguard-rules.pro covers androidx.health.connect.client.records.**"
            echo "$BAD"
            exit 1
          fi
          echo "OK: Health Connect record classes retain their real names in the R8 mapping."

      # Screenshot baselines (app/src/test/screenshots) drift across environments
      # (font/anti-aliasing) when recorded locally, so instead of verifying against a
      # possibly-stale golden we RECORD them in the CI environment and auto-commit any
      # change back to the PR branch. The reviewer then sees the real CI-rendered diff on
      # the PR. This records, it does not gate — the unit-test step above is the test gate.
      #
      # Gated to same-repo pull_request events only: fork PRs get a read-only GITHUB_TOKEN
      # (push would 403), and push-to-main runs have no PR head to commit onto.
      # -x testProdDebugUnitTest: the unit suite already ran above; don't re-run it.
      - name: Record screenshots and commit to PR
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        run: |
          ./gradlew recordRoborazziTableDebug -x testProdDebugUnitTest
          if [ -n "$(git status --porcelain app/src/test/screenshots)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add app/src/test/screenshots
            git commit -m "ci: update screenshot baselines"
            git push origin HEAD:${{ github.head_ref }}
          else
            echo "No screenshot baseline changes to commit."
          fi

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/testProdDebugUnitTest/

      - name: Upload screenshot diffs
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: roborazzi-screenshot-diffs
          path: app/build/outputs/roborazzi/
          if-no-files-found: ignore
