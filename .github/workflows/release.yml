name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > /tmp/release.keystore

      # Build the APK and AAB in SEPARATE Gradle invocations. Under AGP 9 the combined
      # `assembleProdRelease bundleProdRelease` invocation produces a non-deterministic dex
      # (differs build-to-build), whereas `assembleProdRelease` alone is byte-reproducible.
      # F-Droid's reproducible-Binaries verification rebuilds the APK via assembleProdRelease
      # and compares it to the uploaded APK, so the uploaded APK MUST come from the
      # deterministic assemble-alone build — hence the APK is built first, on its own, and the
      # AAB (Play only, no reproducibility check) is built afterwards.
      - name: Build signed release APK
        env:
          RELEASE_KEYSTORE_PATH: /tmp/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        run: ./gradlew assembleProdRelease

      - name: Build signed release AAB
        env:
          RELEASE_KEYSTORE_PATH: /tmp/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        run: ./gradlew bundleProdRelease

      - name: Rename outputs
        run: |
          TAG="${GITHUB_REF_NAME}"
          cp app/build/outputs/apk/prod/release/app-prod-release.apk "health-disconnect-${TAG}.apk"
          cp app/build/outputs/bundle/prodRelease/app-prod-release.aab "health-disconnect-${TAG}.aab"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: health-disconnect-*.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: health-disconnect-*.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            health-disconnect-*.apk
            health-disconnect-*.aab
          generate_release_notes: true
