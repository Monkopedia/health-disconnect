name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > /tmp/release.keystore

      - name: Build signed release APK and AAB
        env:
          RELEASE_KEYSTORE_PATH: /tmp/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        run: ./gradlew assembleProdRelease bundleProdRelease

      - name: Rename outputs
        run: |
          TAG="${GITHUB_REF_NAME}"
          cp app/build/outputs/apk/prod/release/app-prod-release.apk "health-disconnect-${TAG}.apk"
          cp app/build/outputs/bundle/prodRelease/app-prod-release.aab "health-disconnect-${TAG}.aab"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: health-disconnect-*.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: health-disconnect-*.aab

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            health-disconnect-*.apk
            health-disconnect-*.aab
          generate_release_notes: true
